repos:
  # Rust formatting and linting
  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt --check
        description: Check Rust code formatting
        entry: cargo
        language: system
        args: [fmt, --manifest-path, src-tauri/Cargo.toml, --all, --, --check]
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Run clippy on Rust code
        entry: cargo
        language: system
        args:
          [
            clippy,
            --manifest-path,
            src-tauri/Cargo.toml,
            --all-targets,
            --all-features,
            --,
            -D,
            warnings,
          ]
        types: [rust]
        pass_filenames: false

  # Frontend formatting and linting
  - repo: local
    hooks:
      - id: prettier-check
        name: prettier --check
        description: Check JS/TS/CSS/JSON formatting
        entry: pnpm exec prettier --check
        language: system
        types_or: [ts, tsx, javascript, jsx, css, json]
        exclude: ^(pnpm-lock\.yaml|src-tauri/(target|gen)/)

      - id: eslint
        name: eslint
        description: Lint JS/TS source files
        entry: pnpm exec eslint
        language: system
        files: \.(ts|tsx)$
        exclude: ^(dist|node_modules|src-tauri/)

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml

# Run hooks in the following order
default_stages: [pre-commit]
